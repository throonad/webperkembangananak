    const calculateAgeRange = (birthDate) => {
      const now = new Date();
      const dob = new Date(birthDate);
      const diffMonths = (now.getFullYear() - dob.getFullYear()) * 12 + (now.getMonth() - dob.getMonth());
      const diffDays = Math.floor((now - dob) / (1000 * 60 * 60 * 24));

      if (diffDays >= 29 && diffMonths < 3) return "29 hari - 3 bulan";
      if (diffMonths >= 3 && diffMonths < 6) return "3 - 6 bulan";
      if (diffMonths >= 6 && diffMonths < 9) return "6 - 9 bulan";
      if (diffMonths >= 9 && diffMonths < 12) return "9 - 12 bulan";
      if (diffMonths >= 12 && diffMonths < 18) return "12 - 18 bulan";
      if (diffMonths >= 18 && diffMonths < 24) return "18 - 24 bulan";
      if (diffMonths >= 24 && diffMonths < 36) return "2 - 3 tahun";
      if (diffMonths >= 36 && diffMonths < 48) return "3 - 4 tahun";
      if (diffMonths >= 48 && diffMonths < 60) return "4 - 5 tahun";
      if (diffMonths >= 60 && diffMonths < 72) return "5 - 6 tahun";
      return null;
    };

    function hitungUsiaLengkap(tanggalLahir) {
  const lahir = new Date(tanggalLahir);
  const sekarang = new Date();

  let tahun = sekarang.getFullYear() - lahir.getFullYear();
  let bulan = sekarang.getMonth() - lahir.getMonth();
  let hari = sekarang.getDate() - lahir.getDate();

  if (hari < 0) {
    bulan -= 1;
    hari += new Date(sekarang.getFullYear(), sekarang.getMonth(), 0).getDate();
  }

  if (bulan < 0) {
    tahun -= 1;
    bulan += 12;
  }

  return `${tahun} tahun ${bulan} bulan ${hari} hari`;
}

function generateStimulasiHTML(ageRange, tidakIndexes) {
  const stimulasiList = stimulasiByAge[ageRange] || [];
  const folderName = convertAgeRangeToFolder(ageRange);

  if (tidakIndexes.length === 0) return ``;

  return `
    <h3 class="stimulasi-label">
      STIMULASI SESUAI ASPEK YANG PERLU DILATIH
    </h3>
    <div class="stimulasi-grid">
      ${tidakIndexes.map(index => `
        <div class="stimulus-item"
             onclick="showDetailStimulasi('${ageRange}', ${index})"
             style="cursor:pointer">
          <img src="stim/${folderName}/img ${index + 1}.png">
          <p>${stimulasiList[index]}</p>
        </div>
      `).join('')}
    </div>
  `;
}

    function showDetailStimulasi(ageRange, index) {

    stimulasiByAge[ageRange][index];

  // set gambar
  const folder = convertAgeRangeToFolder(ageRange);
  document.getElementById('detailImage').src =
    `stim/${folder}/img ${index + 1}.png`;

  // set langkah
  const list = document.getElementById('detailSteps');
  list.innerHTML = '';
  caraMelakukanByAge[ageRange][index].forEach(step => {
    const li = document.createElement('li');
    li.textContent = step;
    list.appendChild(li);
  });
}
